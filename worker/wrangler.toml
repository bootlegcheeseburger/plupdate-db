name = "plupdate-submit"
main = "src/index.js"
compatibility_date = "2025-01-01"
workers_dev = true
preview_urls = false

# Workers KV used for per-IP rate limiting.
# Run once: `npx wrangler kv namespace create RATE_LIMIT` and paste the id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "eec292e7ec64430cba42f7b1bea819bc"

# Public env (not secret).
[vars]
GITHUB_REPO = "bootlegcheeseburger/plupdate-submissions"
PROMOTE_REPO = "bootlegcheeseburger/plupdate-db"

# Secrets (set via CLI, never commit):
#   npx wrangler secret put GITHUB_TOKEN
#     fine-grained PAT, Issues:write on plupdate-submissions
#   npx wrangler secret put PROMOTE_TOKEN
#     fine-grained PAT, Contents:write + Pull requests:write on plupdate-db
#   npx wrangler secret put ADMIN_TOKEN
#     long random string used to auth /admin and /promote
