name: build-and-publish

on:
  push:
    branches: [main]
    paths:
      - "db/vendors/**"
      - "db/schema.json"
      - "db/scripts/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so validate.py can diff against HEAD~1 for the
          # trustedDomain change-lock check.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: db/requirements.txt
      - run: pip install -r requirements.txt
      - name: Validate
        env:
          PLUPDATE_BASE_REF: HEAD~1
        run: python scripts/validate.py
      - name: Stage Pages content
        run: |
          mkdir -p _site/vendors
          cp vendors/*.json _site/vendors/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: db/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
